<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>mycareerlab</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── 설정 화면 ─────────────────────────── -->
  <div id="setupScreen">
    <div class="setup-card">
      <div class="setup-logo">⚗️</div>
      <h1 class="setup-title">mycareerlab</h1>
      <p class="setup-sub">GitHub 저장소와 연결합니다. 최초 1회만 설정하면 됩니다.</p>

      <div class="field">
        <label class="field-label">GitHub 사용자명</label>
        <input id="cfgOwner" class="field-input" type="text" placeholder="예: hong-gildong" />
      </div>
      <div class="field">
        <label class="field-label">저장소 이름</label>
        <input id="cfgRepo" class="field-input" type="text" placeholder="예: mycareerlab" />
      </div>
      <div class="field">
        <label class="field-label">Personal Access Token</label>
        <input id="cfgToken" class="field-input" type="password" placeholder="ghp_xxxxxxxxxxxx" />
        <p class="field-hint">
          GitHub → Settings → Developer settings<br/>
          → Personal access tokens → Tokens (classic)<br/>
          권한: <strong>repo</strong> 선택 후 생성
        </p>
      </div>

      <button class="btn-primary w-full" id="setupBtn">시작하기</button>
      <p id="setupErr" class="err-msg"></p>
    </div>
  </div>

  <!-- ── 메인 앱 ────────────────────────────── -->
  <div id="appScreen" style="display:none">

    <!-- 사이드바 -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-head">
        <span class="brand">⚗️ mycareerlab</span>
        <button class="btn-x" id="sidebarClose">✕</button>
      </div>
      <nav id="sideNav" class="side-nav"></nav>
      <div class="sidebar-foot">
        <button class="side-item" id="settingsBtn">⚙️ 설정</button>
      </div>
    </aside>
    <div class="overlay" id="overlay"></div>

    <!-- 메인 영역 -->
    <div class="main-wrap">
      <header class="topbar">
        <button class="btn-menu" id="menuBtn">☰</button>
        <h2 class="topbar-title" id="pageTitle">홈</h2>
        <button class="btn-primary btn-sm" id="addBtn" style="display:none">＋ 추가</button>
      </header>
      <div class="page-content" id="pageContent">
        <div class="loading-wrap"><div class="spinner"></div><p>불러오는 중...</p></div>
      </div>
    </div>

    <!-- 하단 네비게이션 (모바일) -->
    <nav class="bottom-nav">
      <button class="bnav-item active" data-nav="home">🏠<span>홈</span></button>
      <button class="bnav-item" data-nav="personal">👤<span>개인</span></button>
      <button class="bnav-item" data-nav="instructor">🎓<span>강사</span></button>
      <button class="bnav-item" data-nav="lab">🔬<span>연구소</span></button>
    </nav>
  </div>

  <!-- ── 항목 추가/수정 모달 ─────────────────── -->
  <div class="modal-overlay" id="entryOverlay" style="display:none">
    <div class="modal-box">
      <div class="modal-head">
        <h3 id="modalHeading">추가</h3>
        <button class="btn-x" id="modalClose">✕</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-foot">
        <button class="btn-secondary" id="modalCancel">취소</button>
        <button class="btn-primary" id="modalSave">저장</button>
      </div>
    </div>
  </div>

  <!-- ── 설정 모달 ──────────────────────────── -->
  <div class="modal-overlay" id="settingsOverlay" style="display:none">
    <div class="modal-box">
      <div class="modal-head">
        <h3>설정</h3>
        <button class="btn-x" id="settingsClose">✕</button>
      </div>
      <div class="modal-body">
        <div class="field">
          <label class="field-label">GitHub 사용자명</label>
          <input id="sOwner" class="field-input" type="text" />
        </div>
        <div class="field">
          <label class="field-label">저장소 이름</label>
          <input id="sRepo" class="field-input" type="text" />
        </div>
        <div class="field">
          <label class="field-label">Personal Access Token</label>
          <input id="sToken" class="field-input" type="password" />
        </div>
        <div class="field">
          <label class="field-label">데이터 상태</label>
          <p id="syncStatus" class="field-hint" style="margin-top:4px"></p>
        </div>
      </div>
      <div class="modal-foot space-between">
        <button class="btn-danger" id="resetBtn">앱 초기화</button>
        <button class="btn-primary" id="saveSettingsBtn">저장</button>
      </div>
    </div>
  </div>

  <!-- ── 확인 모달 ──────────────────────────── -->
  <div class="modal-overlay" id="confirmOverlay" style="display:none">
    <div class="modal-box modal-sm">
      <div class="modal-head">
        <h3 id="confirmTitle">확인</h3>
      </div>
      <div class="modal-body">
        <p id="confirmMsg"></p>
      </div>
      <div class="modal-foot">
        <button class="btn-secondary" id="confirmNo">취소</button>
        <button class="btn-danger" id="confirmYes">삭제</button>
      </div>
    </div>
  </div>

  <!-- ── 토스트 알림 ─────────────────────────── -->
  <div id="toast" class="toast"></div>

  <script src="app.js"></script>
</body>
</html>
